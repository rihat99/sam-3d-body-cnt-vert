MODEL:
  CHECKPOINT_PATH: /home/rikhat/human_global_motion/data/sam-3d-body-checkpoints/sam-3d-body-dinov3/model.ckpt
  MHR_MODEL_PATH: /home/rikhat/human_global_motion/data/sam-3d-body-checkpoints/sam-3d-body-dinov3/assets/mhr_model.pt
  IMAGE_SIZE:
  - 896
  - 896
  IMAGE_MEAN:
  - 0.485
  - 0.456
  - 0.406
  IMAGE_STD:
  - 0.229
  - 0.224
  - 0.225
  BACKBONE:
    TYPE: dinov3_vith16plus
    FROZEN: true
    DROP_PATH_RATE: 0.1
  DECODER:
    DIM: 1024
    FROZEN: true
    DO_CONTACT_TOKENS: true
    DO_KEYPOINT_TOKENS: true
    DO_KEYPOINT3D_TOKENS: true
    CONDITION_TYPE: cliff
    USE_INTRIN_CENTER: false
  CONTACT_HEAD:
    # 21 tokens — one per the first 21 MHR70 keypoints (body + toes/heels)
    NUM_CONTACTS: 21
    # Extra global token(s) not updated with image features (0 = off)
    NUM_GLOBAL_TOKENS: 1
    # 18439 MHR mesh vertices
    NUM_VERTICES: 18439
    MLP_DEPTH: 2
    MLP_CHANNEL_DIV_FACTOR: 1
    # K×K grid sampling around each keypoint (1 = original single-point)
    GRID_SIZE: 3
    GRID_RADIUS: 0.1
  PROMPT_ENCODER:
    ENABLE: true
    MAX_NUM_CLICKS: 1
    PROMPT_KEYPOINTS: mhr70
    MASK_EMBED_TYPE: null
  # SMPL model for T-pose template vertices and face connectivity (used in inference_demo.py)
  SMPL_MODEL_PATH: /home/rikhat/human_global_motion/better_human/models/smpl/SMPL_NEUTRAL.npz
  MHR_HEAD:
    MHR_MODEL_PATH: /home/rikhat/human_global_motion/data/sam-3d-body-checkpoints/sam-3d-body-dinov3/assets/mhr_model.pt
    MLP_DEPTH: 1
    MLP_CHANNEL_DIV_FACTOR: 1
  PERSON_HEAD:
    POSE_TYPE: mhr
    CAMERA_TYPE: perspective
  CAMERA_HEAD:
    MLP_DEPTH: 1
    MLP_CHANNEL_DIV_FACTOR: 1
    DEFAULT_SCALE_FACTOR: 1.0
TRAIN:
  BATCH_SIZE: 32
  VAL_BATCH_SIZE: 32
  NUM_WORKERS: 16
  EPOCHS: 20
  LR: 1e-4
  WEIGHT_DECAY: 1e-4
  LR_SCHEDULER: cosine
  LR_WARMUP_EPOCHS: 1
  LR_MIN: 1e-6
  USE_FP16: false
  FP16_TYPE: float32
  GRAD_CLIP: 1.0
  # Positive class weight for heavily imbalanced per-vertex labels.
  # Set to null to auto-compute from train set statistics.
  POS_WEIGHT: null
  # Multiplier on the negative-class BCE loss; >1.0 penalises false positives harder.
  NEG_WEIGHT: 2.0
  SAVE_FREQ: 5
  VAL_FREQ: 1
  RESUME: null
DATASET:
  # Combined train+val npz — split by index with VAL_RATIO / SEED.
  TRAINVAL_NPZ: /home/rikhat/human_global_motion/datasets/daimon_mhr_contact/hot_dca_trainval_mhr.npz
  # Held-out test set (separate npz file).
  TEST_NPZ: /home/rikhat/human_global_motion/datasets/daimon_mhr_contact/hot_dca_test_mhr.npz
  # Original DECO NPZs with SMPL (6890-vertex) contact labels — used for SMPL-space evaluation.
  SMPL_TRAINVAL_NPZ: /media/rikhat/Hard/datasets/DECO/datasets/Release_Datasets/damon/hot_dca_trainval.npz
  SMPL_TEST_NPZ: /media/rikhat/Hard/datasets/DECO/datasets/Release_Datasets/damon/hot_dca_test.npz
  # Root directory containing the 'datasets/' folder referenced in imgname.
  # Leave null to use DAMON_DATA_ROOT env var or auto-detect from npz_path.
  DATA_ROOT: /media/rikhat/Hard/datasets/DECO
  # Fraction of TRAINVAL samples held out for validation.
  VAL_RATIO: 0.2
  # Fixed random seed — ensures identical train/val split across all runs.
  SEED: 42
OUTPUT:
  # Base output directory — each run gets a sub-folder named by date-time
  DIR: ./train/output
  EXP_NAME: contact_vert  # prefix; actual folder = EXP_NAME_YYYYMMDD_HHMMSS
  LOG_FREQ: 10
  USE_TENSORBOARD: true
